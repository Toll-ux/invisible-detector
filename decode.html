<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Декодер — Ведьмочки с ключом на 9</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .toolbar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
    }
    .toolbar-label { font-size: 13px; color: var(--text2); font-weight: 500; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .editor-wrap { position: relative; }
    .char-count {
      position: absolute; bottom: 10px; right: 12px;
      font-size: 11px; color: var(--text3); font-family: var(--font-mono);
      pointer-events: none;
    }
    textarea#inputText { min-height: 190px; line-height: 1.7; }
    .found-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .found-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px;
    }
    #foundList::-webkit-scrollbar {width: 6px;}
    #foundList::-webkit-scrollbar-track {background: var(--surface); border-radius: 10px;}
    #foundList::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      transition: background 0.2s;
    }
    #foundList::-webkit-scrollbar-thumb:hover {background: rgba(255, 255, 255, 0.2);}
    .found-item.sev-highest  {border-color: #60a5fa; background:  rgba(59, 130, 246, 0.15);  }
    .found-item.sev-high   { border-color: rgba(232,65,122,.25); background: rgba(232,65,122,.05); }
    .found-item.sev-medium { border-color: rgba(245,158,11,.2);  background: rgba(245,158,11,.04); }
    .found-name { flex: 1; font-weight: 500; color: var(--text); }
    .found-cnt {
      font-size: 11px; font-weight: 600; font-family: var(--font-mono);
      padding: 2px 8px; border-radius: 20px;
    }
    .cnt-highest{background:  rgba(59, 130, 246, 0.15); color: #60a5fa;   }
    .cnt-high   { background: rgba(232,65,122,.15); color: var(--accent); }
    .cnt-medium { background: rgba(245,158,11,.15);  color: var(--warn); }
    .cnt-low    { background: var(--surface); color: var(--text2); }
    .result-box {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      font-size: 13px; line-height: 1.8;
      white-space: pre-wrap; word-break: break-word;
      min-height: 60px; max-height: 180px; overflow-y: auto;
    }
    mark.hi-red  { background: rgba(232,65,122,.22); color: #f589a8; border-radius: 3px; font-family: var(--font-mono); font-size: 11px; padding: 0 3px; }
    mark.hi-warn { background: rgba(245,158,11,.18);  color: #fbc96a; border-radius: 3px; font-family: var(--font-mono); font-size: 11px; padding: 0 3px; }
    mark.hi-gray { background: var(--surface); color: var(--text2); border-radius: 3px; font-family: var(--font-mono); font-size: 11px; padding: 0 3px; }
    mark.hi-blue  { background: rgba(59,130,246,.20);  color: #93c5fd; border-radius: 3px; font-family: var(--font-mono); font-size: 11px; padding: 0 3px; }
    .noise-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 14px 16px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .noise-row label { font-size: 13px; color: var(--text2); }
    input[type=range] { flex: 1; min-width: 100px; accent-color: var(--accent2); }
    #noiseLbl { font-size: 13px; font-weight: 500; font-family: var(--font-mono); min-width: 20px; }
    .empty-state { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 13px; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <main>
    <h1 style="font-family:var(--font-display);font-size:1.9rem;font-weight:700;letter-spacing:-.5px;margin-bottom:.3rem">Декодер символов</h1>

    <!-- INPUT -->
    <div class="toolbar">
      <span class="toolbar-label" id="inputLabel">Введите или вставьте текст</span>
      <div class="btn-row">
        <button class="btn" style="color:var(--text);border-color:rgba(232,65,122,.25)" onclick="loadSample()">Пример текста</button>
        <button class="btn" style="color:var(--accent);border-color:rgba(232,65,122,.25)" onclick="clearAll()">Очистить</button>
      </div>
    </div>
    <div class="editor-wrap">
      <textarea id="inputText" placeholder="Вставьте текст из источника..." oninput="onInput()"></textarea>
      <span class="char-count" id="charCount">0</span>
    </div>

    <!-- STATS -->
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val c-purple" id="sTotal">0</div><div class="stat-lbl">Всего</div></div>
      <div class="stat-card"><div class="stat-val c-red"    id="sInvis">0</div><div class="stat-lbl">Невидимых</div></div>
      <div class="stat-card"><div class="stat-val c-blue" id="sHidden">0</div><div class="stat-lbl">Спрятанных</div></div>
      <div class="stat-card"><div class="stat-val c-warn"   id="sTypes">0</div><div class="stat-lbl">Типов</div></div>
      <div class="stat-card"><div class="stat-val c-teal"   id="sClean">0</div><div class="stat-lbl">Чистых</div></div>
    </div>

    <div id="alertBox" style="margin-bottom:1rem"></div>

    <!-- HIGHLIGHTED -->
    <div id="highlightSection" style="display:none;margin-top:1.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <p style="font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px">Текст с выделением</p>
      </div>
      <div class="result-box" id="highlightBox"></div>
    </div>

    <!-- FOUND LIST -->
    <p style="font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Обнаруженные символы</p>
    <div class="found-list" id="foundList">
      <div class="empty-state">Введите текст для анализа</div>
    </div>
    <hr>

    <!-- ACTIONS -->
    <div class="btn-row" style="margin-bottom:1rem">
      <button class="btn btn-primary" onclick="doRemove()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Удалить невидимые символы
      </button>
      <button class="btn" onclick="doCopy()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Копировать текст
      </button>
    </div>

    <div id="cleanSection" style="display:none;margin-bottom:1.5rem">
      <p style="font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Очищенный текст</p>
      <div class="result-box" id="cleanBox"></div>
    </div>
  </main>
  <footer>
    <p>InvisibleDetector · <a href="index.html">Главная</a> · <a href="about.html">О проекте</a></p>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/detector.js"></script>
  <script>
    const D = window.Detector;
    let currentText = '';

    function onInput() {
      currentText = document.getElementById('inputText').value;
      document.getElementById('charCount').textContent = currentText.length + ' симв.';
      render(D.analyzeText(currentText));
    }

    function render(result) {
      document.getElementById('sTotal').textContent = result.totalChars;
      document.getElementById('sInvis').textContent = result.totalInv;
      document.getElementById('sHidden').textContent = result.totalHid;
      document.getElementById('sTypes').textContent = result.typesFound;
      document.getElementById('sClean').textContent = result.cleanChars;

      const alertBox = document.getElementById('alertBox');
      if (result.totalChars === 0) {
        alertBox.innerHTML = '';
      } else if (result.isClean) {
        alertBox.innerHTML = '<div class="alert alert-success">Скрытых символов не найдено — текст чистый</div>';
      } else {
        alertBox.innerHTML = `<div class="alert alert-danger">Найдено ${result.totalInvisible} скрытых символов (${result.typesFound} типов)</div>`;
      }

      const list = document.getElementById('foundList');
      if (result.found.length === 0) {
        list.innerHTML = `<div class="empty-state">${result.totalChars > 0 ? 'Символы не обнаружены' : 'Введите текст для анализа'}</div>`;
        document.getElementById('highlightSection').style.display = 'none';
        return;
      }

      list.innerHTML = result.found.map(f => `
        <div class="found-item sev-${f.severity}">
          <span class="tag tag-${f.severity === 'highest' ? 'blue' : f.severity === 'high' ? 'red' : f.severity === 'medium' ? 'warn' : 'gray'}">${f.code}</span>
          <span class="found-name">${f.name}</span>
          <span class="found-cnt cnt-${f.severity}">${f.count}×</span>
        </div>
      `).join('');

      document.getElementById('highlightSection').style.display = 'block';
      document.getElementById('highlightBox').innerHTML = D.highlightInvisible(currentText);
    }

    function loadSample() {
      document.getElementById('inputText').value = D.generateNoisySample();
      onInput();
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('cleanSection').style.display = 'none';
      document.getElementById('highlightSection').style.display = 'none';
      currentText = '';
      onInput();
    }

    function doRemove() {
      if (!currentText) return;
      const clean = D.removeInvisible(currentText);
      document.getElementById('inputText').value = clean;
      document.getElementById('cleanBox').textContent = clean;
      document.getElementById('cleanSection').style.display = 'block';
      currentText = clean;
      onInput();
      showToast('Символы удалены!');
    }

    async function doCopy() {
      const clean = D.removeInvisible(currentText || '');
      const ok = await D.copyToClipboard(clean);
      showToast(ok ? 'Скопировано!' : 'Не удалось скопировать', ok ? 'success' : 'error');
    }
  </script>
</body>
</html>
